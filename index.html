<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ 스타벅스 코리아 전국 매장 현황</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>
<style>
:root {
  --green:    #006241;
  --green-lt: #00A862;
  --green-bg: #E8F5EE;
  --cream:    #F9F6F1;
  --gold:     #CDA882;
  --text:     #1A1A1A;
  --text-2:   #5A5A5A;
  --text-3:   #909090;
  --border:   rgba(0,0,0,0.09);
  --card:     #FFFFFF;
  --radius:   12px;
  --shadow:   0 2px 16px rgba(0,98,65,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--cream); color: var(--text); }

header {
  background: var(--green); color: #fff;
  padding: 20px 0;
  position: sticky; top: 0; z-index: 1000;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
}
.header-inner {
  max-width: 1280px; margin: 0 auto; padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon { width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px; }
.logo h1 { font-size:17px;font-weight:600;letter-spacing:-.3px; }
.logo span { font-size:12px;opacity:.7;font-weight:300;margin-top:1px;display:block; }
.header-right { display:flex;align-items:center;gap:12px; }
.update-badge { background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 14px;font-size:12px;display:flex;align-items:center;gap:6px; }
.update-badge .dot { width:7px;height:7px;border-radius:50%;background:#69D98C;animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
.refresh-btn { background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s; }
.refresh-btn:hover { background:rgba(255,255,255,.25); }

main { max-width:1280px;margin:0 auto;padding:28px 24px 48px; }

.kpi-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px; }
.kpi { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:transform .2s; }
.kpi:hover { transform:translateY(-2px); }
.kpi::before { content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--green); }
.kpi-icon { font-size:22px;margin-bottom:8px; }
.kpi-label { font-size:12px;color:var(--text-2);margin-bottom:4px; }
.kpi-val { font-size:28px;font-weight:600;color:var(--green);font-family:'DM Mono',monospace; }
.kpi-val.kpi-text { font-family:'Noto Sans KR',sans-serif;font-size:28px; }
.kpi-sub { font-size:11px;color:var(--text-3);margin-top:4px; }

.charts-row { display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:20px; }
.chart-card { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow); }
.chart-head { display:flex;align-items:center;justify-content:space-between;margin-bottom:14px; }
.chart-head h3 { font-size:13px;font-weight:500;color:var(--text-2); }
.chart-hint { font-size:11px;color:var(--text-3); }

/* 선택 상태 배지 */
.region-badge {
  display:none;align-items:center;gap:6px;
  background:var(--green-bg);color:var(--green);
  border:1px solid rgba(0,98,65,.2);
  border-radius:20px;padding:3px 10px;font-size:12px;font-weight:500;
}
.region-badge.visible { display:flex; }
.region-badge button { background:none;border:none;cursor:pointer;color:var(--green);font-size:14px;line-height:1;padding:0 2px; }

.map-card { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:20px; }
.map-header { padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap; }
.map-header h3 { font-size:13px;font-weight:500;color:var(--text-2); }
.map-filters { display:flex;gap:6px;flex-wrap:wrap; }
.map-toggle { padding:4px 12px;font-size:11px;border:1px solid var(--border);border-radius:20px;cursor:pointer;background:#fff;color:var(--text-2);transition:all .15s;font-family:inherit; }
.map-toggle.active { background:var(--green);color:#fff;border-color:var(--green); }
#map { height:380px; }

.table-card { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow); }
.table-header { padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap; }
.table-header h3 { font-size:13px;font-weight:500;color:var(--text-2);margin-right:4px; }
input[type="text"] { border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:13px;width:200px;font-family:inherit;outline:none;transition:border .2s; }
input[type="text"]:focus { border-color:var(--green); }
select { border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit;background:#fff;cursor:pointer;outline:none; }
.result-count { margin-left:auto;font-size:12px;color:var(--text-3);font-family:'DM Mono',monospace; }
.tbl-wrap { overflow-x:auto;max-height:320px;overflow-y:auto; }
table { width:100%;border-collapse:collapse;font-size:13px; }
thead th { padding:10px 16px;text-align:left;font-weight:500;color:var(--text-2);background:#FAFAF8;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1;white-space:nowrap; }
td { padding:9px 16px;border-bottom:1px solid var(--border); }
td.addr { color:var(--text-3);font-size:12px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover { background:#F7FBF9; cursor:pointer; }
tbody tr.selected-row { background:#E8F5EE; }
tbody tr.selected-row td { color:var(--green); font-weight:500; }
.pill { display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.4px; }
.pill-dt { background:#E3F2FD;color:#1565C0; }
.pill-rv { background:#FFF8E1;color:#F57F17; }
.pill-gen { background:var(--green-bg);color:var(--green); }

footer { text-align:center;padding:24px;font-size:12px;color:var(--text-3);border-top:1px solid var(--border); }
footer a { color:var(--green);text-decoration:none; }

#loading { position:fixed;inset:0;background:var(--cream);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;transition:opacity .4s; }
.loader { width:48px;height:48px;border:3px solid var(--green-bg);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loader-text { font-size:14px;color:var(--text-2); }

@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.charts-row{grid-template-columns:1fr}}
@media(max-width:560px){header{padding:16px 20px}main{padding:20px 16px 40px}.kpi-grid{gap:10px}}
</style>
</head>
<body>

<div id="loading">
  <div class="loader"></div>
  <div class="loader-text">매장 데이터 로딩 중...</div>
</div>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">☕</div>
      <div>
        <h1>스타벅스 코리아 전국 매장 현황</h1>
        <span>Starbucks Korea Store Dashboard</span>
      </div>
    </div>
    <div class="header-right">
      <div class="update-badge"><span class="dot"></span><span id="updatedAt">로딩 중...</span></div>
      <button class="refresh-btn" onclick="location.reload()">↻ 새로고침</button>
    </div>
  </div>
</header>

<main>
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-icon">🏪</div><div class="kpi-label">전체 매장 수</div><div class="kpi-val" id="kTotal">—</div><div class="kpi-sub">전국 17개 시·도</div></div>
    <div class="kpi"><div class="kpi-icon">🚗</div><div class="kpi-label">드라이브스루</div><div class="kpi-val" id="kDT">—</div><div class="kpi-sub" id="kDTpct">—</div></div>
    <div class="kpi"><div class="kpi-icon">⭐</div><div class="kpi-label">리저브 매장</div><div class="kpi-val" id="kRV">—</div><div class="kpi-sub">프리미엄 체험 공간</div></div>
    <div class="kpi"><div class="kpi-icon">📍</div><div class="kpi-label">최다 밀집 지역</div><div class="kpi-val kpi-text" id="kTop">—</div><div class="kpi-sub" id="kTopSub">—</div></div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-head">
        <h3>지역별 매장 수</h3>
        <span class="chart-hint" id="regionHint">클릭하면 해당 지역으로 필터링</span>
      </div>
      <div style="position:relative;width:100%;height:220px">
        <canvas id="regionChart" role="img" aria-label="지역별 스타벅스 매장 수"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-head">
        <h3 id="guTitle">구·군별 상위 15</h3>
        <div class="region-badge" id="regionBadge">
          <span id="badgeText"></span>
          <button onclick="clearFilter()" title="필터 해제">✕</button>
        </div>
      </div>
      <div style="position:relative;width:100%;height:220px">
        <canvas id="guChart" role="img" aria-label="구군별 매장 수 상위 15"></canvas>
      </div>
    </div>
  </div>

  <div class="map-card">
    <div class="map-header">
      <h3>🗺️ 전국 매장 지도</h3>
      <div class="map-filters">
        <button class="map-toggle active" onclick="setMapFilter(this,'all')">전체</button>
        <button class="map-toggle" onclick="setMapFilter(this,'dt')">드라이브스루</button>
        <button class="map-toggle" onclick="setMapFilter(this,'rv')">리저브</button>
      </div>
    </div>
    <div id="map"></div>
  </div>

  <div class="table-card">
    <div class="table-header">
      <h3>매장 목록</h3>
      <input type="text" id="searchInput" placeholder="매장명 또는 주소 검색…" oninput="renderTable()">
      <select id="regionFilter" onchange="renderTable()">
        <option value="">전체 지역</option>
      </select>
      <select id="typeFilter" onchange="renderTable()">
        <option value="">전체 유형</option>
        <option value="dt">드라이브스루</option>
        <option value="rv">리저브</option>
        <option value="gen">일반</option>
      </select>
      <span style="font-size:11px;color:var(--text-3)">행 클릭 시 지도 이동</span>
      <span class="result-count" id="resultCount"></span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>매장명</th><th>지역</th><th>주소</th><th>유형</th></tr></thead>
        <tbody id="tblBody"></tbody>
      </table>
    </div>
  </div>
</main>

<footer>
  데이터 출처: <a href="https://www.starbucks.co.kr" target="_blank">Starbucks Korea</a>
  &nbsp;·&nbsp; 자동 업데이트: 매주 월요일
  &nbsp;·&nbsp; <a href="https://github.com" target="_blank">GitHub Actions</a> 기반
</footer>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ── 전역 상태 ─────────────────────────────────────────────────────────────────
let STORES       = [];
let DATA         = {};
let mapInstance  = null;
let ALL_MARKERS  = [];
let typeFilter   = 'all';
let selectedRegion = null;
let selectedGu     = null;
let regionChartInst = null;
let guChartInst     = null;

// 스타벅스 브랜드 그린 (마커 고유 색상)
const SBUX_GREEN  = '#006241';
const SBUX_DARK   = '#004C32';

// ── 데이터 로드 ──────────────────────────────────────────────────────────────
async function loadData() {
  const res = await fetch('./data/stores.json?v=' + Date.now());
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ── KPI ─────────────────────────────────────────────────────────────────────
function renderKPI(data) {
  document.getElementById('updatedAt').textContent = data.updated;
  document.getElementById('kTotal').textContent = data.total.toLocaleString();
  document.getElementById('kDT').textContent    = data.dt_count.toLocaleString();
  document.getElementById('kDTpct').textContent = `전체의 ${((data.dt_count/data.total)*100).toFixed(1)}%`;
  document.getElementById('kRV').textContent    = data.rv_count.toLocaleString();
  const sorted = Object.entries(data.region_stats).sort((a,b)=>b[1].total-a[1].total);
  const [topR, topS] = sorted[0];
  document.getElementById('kTop').textContent   = topR;
  document.getElementById('kTopSub').textContent = `${topS.total.toLocaleString()}개 매장`;
}

// ── 지역 차트 ────────────────────────────────────────────────────────────────
function renderRegionChart(data) {
  const regions = Object.entries(data.region_stats).sort((a,b)=>b[1].total-a[1].total);
  const rLabels = regions.map(r=>r[0]);
  const rNorm   = regions.map(r=>r[1].total - r[1].dt);
  const rDT     = regions.map(r=>r[1].dt);

  regionChartInst = new Chart(document.getElementById('regionChart').getContext('2d'), {
    type: 'bar',
    data: {
      labels: rLabels,
      datasets: [
        { label:'일반', data:rNorm, backgroundColor:SBUX_GREEN, borderWidth:0, borderRadius:2 },
        { label:'DT',   data:rDT,   backgroundColor:'#00A862',  borderWidth:0, borderRadius:2 }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins: { legend:{display:false} },
      scales: {
        x: { stacked:true, ticks:{font:{size:10},color:'#888'}, grid:{display:false} },
        y: { stacked:true, ticks:{font:{size:10},color:'#888'}, grid:{color:'rgba(0,0,0,.05)'} }
      },
      onClick: (event, elements) => {
        if (elements.length > 0) {
          const idx    = elements[0].index;
          const region = rLabels[idx];
          if (selectedRegion === region) {
            clearFilter();
          } else {
            applyRegionFilter(region, data);
          }
        }
      },
      onHover: (event, elements) => {
        event.native.target.style.cursor = elements.length ? 'pointer' : 'default';
      }
    }
  });
}

// ── 구군 차트 ────────────────────────────────────────────────────────────────
function renderGuChart(guData) {
  // 구군 필터 초기화 (데이터 변경 시)
  selectedGu = null;

  if (guChartInst) {
    guChartInst.data.labels               = guData.map(g=>g[0]);
    guChartInst.data.datasets[0].data     = guData.map(g=>g[1]);
    guChartInst.data.datasets[0].backgroundColor = guData.map(()=>'#CDA882');
    guChartInst.update('active');
    return;
  }
  guChartInst = new Chart(document.getElementById('guChart').getContext('2d'), {
    type: 'bar',
    data: {
      labels: guData.map(g=>g[0]),
      datasets: [{ data:guData.map(g=>g[1]), backgroundColor:'#CDA882', borderWidth:0, borderRadius:3 }]
    },
    options: {
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins: { legend:{display:false} },
      scales: {
        x:{ ticks:{font:{size:10},color:'#888'}, grid:{color:'rgba(0,0,0,.05)'} },
        y:{ ticks:{font:{size:10},color:'#888'}, grid:{display:false} }
      },
      onClick: (event, elements) => {
        if (elements.length > 0) {
          const idx    = elements[0].index;
          const guName = guChartInst.data.labels[idx];
          if (selectedGu === guName) {
            clearGuFilter();
          } else {
            filterMapByGu(guName);
          }
        }
      },
      onHover: (event, elements) => {
        event.native.target.style.cursor = elements.length ? 'pointer' : 'default';
      }
    }
  });
}

// ── 구군 필터 ────────────────────────────────────────────────────────────────
function filterMapByGu(guName) {
  selectedGu = guName;
  updateGuChartColors(guName);

  ALL_MARKERS.forEach(m => {
    const inGu     = m._gugun === guName;
    const inRegion = !selectedRegion || m._region === selectedRegion;
    const inType   = typeFilter === 'all' || m._storeType === typeFilter;
    const show     = inGu && inRegion && inType;
    if (show) { if (!mapInstance.hasLayer(m)) m.addTo(mapInstance); }
    else       { mapInstance.removeLayer(m); }
  });

  const visible = ALL_MARKERS.filter(m => mapInstance.hasLayer(m));
  if (visible.length > 0) {
    try { mapInstance.fitBounds(L.featureGroup(visible).getBounds().pad(0.2)); } catch(e){}
  }
}

function clearGuFilter() {
  selectedGu = null;
  updateGuChartColors(null);
  if (selectedRegion) filterMapByRegion(selectedRegion);
  else                resetMapFilter();
}

function updateGuChartColors(selected) {
  if (!guChartInst) return;
  guChartInst.data.datasets[0].backgroundColor =
    guChartInst.data.labels.map(l =>
      !selected || l === selected ? '#CDA882' : 'rgba(205,168,130,.2)'
    );
  guChartInst.update('active');
}

// ── 지역 필터 적용 ───────────────────────────────────────────────────────────
function applyRegionFilter(region, data) {
  selectedRegion = region;

  // 배지 표시
  document.getElementById('badgeText').textContent = region;
  document.getElementById('regionBadge').classList.add('visible');
  document.getElementById('guTitle').textContent = `${region} 구·군별 매장 수`;

  // 지역 차트 색상 강조
  updateRegionChartColors(region);

  // 구군 차트 업데이트
  const regionStores = STORES.filter(s => s.r === region);
  const guCount = {};
  regionStores.forEach(s => {
    const parts = (s.a||'').split(' ');
    if (parts.length >= 2) guCount[parts[1]] = (guCount[parts[1]]||0)+1;
  });
  const guData = Object.entries(guCount).sort((a,b)=>b[1]-a[1]).slice(0,15);
  renderGuChart(guData);

  // 지도 필터
  filterMapByRegion(region);

  // 테이블 필터
  document.getElementById('regionFilter').value = region;
  renderTable();
}

function clearFilter() {
  selectedRegion = null;

  document.getElementById('regionBadge').classList.remove('visible');
  document.getElementById('guTitle').textContent = '구·군별 상위 15';

  // 지역 차트 색상 초기화
  updateRegionChartColors(null);

  // 구군 차트 전체 복원
  renderGuChart(DATA.top_gu.slice(0,15));

  // 지도 전체 복원
  resetMapFilter();
  mapInstance.setView([36.5, 127.8], 7);

  // 테이블 초기화
  document.getElementById('regionFilter').value = '';
  renderTable();
}

function updateRegionChartColors(selected) {
  if (!regionChartInst) return;
  const labels = regionChartInst.data.labels;
  regionChartInst.data.datasets[0].backgroundColor = labels.map(l =>
    !selected || l === selected ? SBUX_GREEN : 'rgba(0,98,65,.2)'
  );
  regionChartInst.data.datasets[1].backgroundColor = labels.map(l =>
    !selected || l === selected ? '#00A862' : 'rgba(0,168,98,.2)'
  );
  regionChartInst.update('active');
}

// ── 지도 ────────────────────────────────────────────────────────────────────
function initMap(stores) {
  mapInstance = L.map('map', {zoomControl:true}).setView([36.5, 127.8], 7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap contributors', maxZoom:18
  }).addTo(mapInstance);

  stores.forEach(s => {
    const isDT = s.dt === 1;
    const isRV = s.rv === 1;

    // 모든 마커 스타벅스 브랜드 그린 단일 색상
    const marker = L.circleMarker([s.lat, s.lng], {
      radius:      isRV ? 7 : isDT ? 5.5 : 4.5,
      fillColor:   SBUX_GREEN,
      color:       isRV ? '#CDA882' : (isDT ? '#fff' : '#fff'),
      weight:      isRV ? 2 : 1,
      fillOpacity: 0.88
    }).bindPopup(`
      <b style="font-size:13px">${s.n}</b><br>
      <span style="color:#666;font-size:11px">${s.r}</span><br>
      <span style="color:#888;font-size:11px">${s.a}</span><br>
      ${isDT ? '<span style="color:#1565C0;font-size:11px;font-weight:600">🚗 드라이브스루</span>' : ''}
      ${isRV ? '<span style="color:#F57F17;font-size:11px;font-weight:600">⭐ 리저브</span>'      : ''}
    `);

    const addrParts = (s.a||'').split(' ');
    marker._storeType = isDT ? 'dt' : (isRV ? 'rv' : 'gen');
    marker._region    = s.r;
    marker._gugun     = addrParts.length >= 2 ? addrParts[1] : '';
    marker.addTo(mapInstance);
    ALL_MARKERS.push(marker);
  });

  // 범례
  const legend = L.control({position:'bottomright'});
  legend.onAdd = () => {
    const d = L.DomUtil.create('div');
    d.style.cssText = 'background:rgba(255,255,255,.92);padding:10px 14px;border-radius:8px;font-size:11px;line-height:2;box-shadow:0 2px 8px rgba(0,0,0,.12)';
    d.innerHTML =
      `<b style="display:block;margin-bottom:4px;font-size:12px">범 례</b>` +
      `<span style="display:flex;align-items:center;gap:6px"><span style="width:10px;height:10px;border-radius:50%;background:${SBUX_GREEN};border:1px solid #fff;display:inline-block"></span> 일반 매장</span>` +
      `<span style="display:flex;align-items:center;gap:6px"><span style="width:11px;height:11px;border-radius:50%;background:${SBUX_GREEN};border:2px solid #CDA882;display:inline-block"></span> 리저브</span>` +
      `<span style="display:flex;align-items:center;gap:6px"><span style="width:10px;height:10px;border-radius:50%;background:${SBUX_GREEN};border:1px solid #fff;opacity:.9;display:inline-block"></span> 드라이브스루</span>`;
    return d;
  };
  legend.addTo(mapInstance);
}

function filterMapByRegion(region) {
  ALL_MARKERS.forEach(m => {
    const show = m._region === region &&
                 (typeFilter === 'all' || m._storeType === typeFilter);
    if (show) { if (!mapInstance.hasLayer(m)) m.addTo(mapInstance); }
    else       { mapInstance.removeLayer(m); }
  });
  // 해당 지역으로 지도 이동
  const visible = ALL_MARKERS.filter(m => mapInstance.hasLayer(m));
  if (visible.length > 0) {
    try {
      const group = L.featureGroup(visible);
      mapInstance.fitBounds(group.getBounds().pad(0.15));
    } catch(e) {}
  }
}

function resetMapFilter() {
  ALL_MARKERS.forEach(m => {
    const show = typeFilter === 'all' || m._storeType === typeFilter;
    if (show) { if (!mapInstance.hasLayer(m)) m.addTo(mapInstance); }
    else       { mapInstance.removeLayer(m); }
  });
}

function setMapFilter(btn, filter) {
  typeFilter = filter;
  document.querySelectorAll('.map-toggle').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (selectedRegion) filterMapByRegion(selectedRegion);
  else                resetMapFilter();
}

// ── 매장 지도 이동 ────────────────────────────────────────────────────────────
function zoomToStore(lat, lng, row) {
  // 행 선택 표시
  document.querySelectorAll('#tblBody tr').forEach(r => r.classList.remove('selected-row'));
  row.classList.add('selected-row');

  // 지도로 스크롤
  document.getElementById('map').scrollIntoView({behavior:'smooth', block:'center'});

  // 마커 찾기 (비가시 마커 포함)
  const marker = ALL_MARKERS.find(m => {
    const ll = m.getLatLng();
    return Math.abs(ll.lat - lat) < 0.0002 && Math.abs(ll.lng - lng) < 0.0002;
  });

  setTimeout(() => {
    mapInstance.setView([lat, lng], 17);
    if (marker) {
      // 숨겨진 마커면 임시 추가
      if (!mapInstance.hasLayer(marker)) marker.addTo(mapInstance);
      marker.openPopup();
    } else {
      L.popup({ closeOnClick: true })
        .setLatLng([lat, lng])
        .setContent(`<b>${row.cells[0].textContent}</b><br>
          <span style="color:#666;font-size:11px">${row.cells[1].textContent}</span><br>
          <span style="color:#888;font-size:11px">${row.cells[2].title}</span>`)
        .openOn(mapInstance);
    }
  }, 500);
}

// ── 테이블 ───────────────────────────────────────────────────────────────────
function renderTable() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const r = document.getElementById('regionFilter').value;
  const t = document.getElementById('typeFilter').value;

  const filtered = STORES.filter(s => {
    if (r && s.r !== r) return false;
    if (t === 'dt'  && s.dt !== 1) return false;
    if (t === 'rv'  && s.rv !== 1) return false;
    if (t === 'gen' && (s.dt===1||s.rv===1)) return false;
    if (q && !s.n.toLowerCase().includes(q) && !s.a.toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('resultCount').textContent =
    `${filtered.length.toLocaleString()} / ${STORES.length.toLocaleString()}개`;

  document.getElementById('tblBody').innerHTML = filtered.slice(0,300).map(s=>`
    <tr onclick="zoomToStore(${s.lat},${s.lng},this)">
      <td>${s.n}</td><td>${s.r}</td>
      <td class="addr" title="${s.a}">${s.a}</td>
      <td>
        ${s.dt ? '<span class="pill pill-dt">DT</span>'      : ''}
        ${s.rv ? '<span class="pill pill-rv">Reserve</span>' : ''}
        ${!s.dt&&!s.rv ? '<span class="pill pill-gen">일반</span>' : ''}
      </td>
    </tr>`).join('');
}

// ── 초기화 ───────────────────────────────────────────────────────────────────
(async () => {
  try {
    DATA   = await loadData();
    STORES = DATA.stores;

    renderKPI(DATA);
    renderRegionChart(DATA);
    renderGuChart(DATA.top_gu.slice(0,15));

    // 지역 필터 옵션
    const sel = document.getElementById('regionFilter');
    Object.entries(DATA.region_stats)
      .sort((a,b)=>b[1].total-a[1].total)
      .forEach(([r,s]) => {
        const o = document.createElement('option');
        o.value = r; o.textContent = `${r} (${s.total})`;
        sel.appendChild(o);
      });

    renderTable();
    setTimeout(() => initMap(STORES), 150);

    const overlay = document.getElementById('loading');
    overlay.style.opacity = '0';
    setTimeout(() => overlay.style.display='none', 400);

  } catch(err) {
    document.getElementById('loading').innerHTML =
      `<div style="text-align:center;color:#C62828">
        <div style="font-size:32px;margin-bottom:12px">⚠️</div>
        <div style="font-size:15px;font-weight:600">데이터 로드 실패</div>
        <div style="font-size:13px;color:#666;margin-top:8px">${err.message}</div>
        <button onclick="location.reload()" style="margin-top:16px;padding:8px 20px;background:#006241;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px">재시도</button>
      </div>`;
  }
})();
</script>
</body>
</html>

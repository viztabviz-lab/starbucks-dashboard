name: 스타벅스 매장 데이터 자동 수집

on:
  schedule:
    - cron: '0 21 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-store-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 의존성 설치
        run: pip install requests openpyxl pandas
      - name: 매장 데이터 수집
        run: python scripts/scrape.py
        env:
          PYTHONIOENCODING: utf-8
      - name: 커밋 & 푸시
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "매장 데이터 업데이트 $(date +'%Y-%m-%d')"
            git push
          fi
